<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pattern</title>
</head>
<body>
    
    <script>
        
        let n = 7;

        for (let i = 1; i <= n; i++) 
        {
            let row = ""; 

            for (let j = 1; j <= n; j++) {
                let condition = 
                    (i === 1 && j >= 4) ||
                    (j === 4) ||
                    (i === n && j <= 4) ||
                    (i === 4) ||
                    (j === 1 && i <= 4) ||
                    (j === n && i >= 4);

                if (condition) {
                    row += "0";
                } else {
                    row += " ";
                }
            }

            console.log(row); 
        }
    </script>

</body>
</html>
