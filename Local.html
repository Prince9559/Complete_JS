<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Live Tracking Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    body { margin: 0; font-family: Arial; }
    #map { height: 100vh; }

    #clearBtn {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 1000;
      padding: 10px 15px;
      background: red;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<button id="clearBtn">Clear Path</button>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const defaultLat = 25.3176;
const defaultLng = 82.9739;

const map = L.map('map').setView([defaultLat, defaultLng], 15);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
}).addTo(map);


let marker = L.marker([defaultLat, defaultLng]).addTo(map);
let latlngs = JSON.parse(localStorage.getItem("path")) || [];
let polyline = L.polyline(latlngs, { color: 'blue', weight: 5 }).addTo(map);


function getCurrentLocation() 
{
  return new Promise((resolve, reject) => {

    if (!navigator.geolocation) 
    {
      reject("Geolocation not supported");
    }

    navigator.geolocation.getCurrentPosition(
      (position) => {
        resolve({
          lat: position.coords.latitude,
          lng: position.coords.longitude,
          accuracy: position.coords.accuracy
        });
      },
      (error) => {
        reject(error.message);
      }
    );

  });
}

async function getLocationName(lat, lng) 
{
  try {
    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
    const data = await res.json();
    const address = data.address;

    const locality = address.road || address.suburb || address.neighbourhood || address.village || address.city ||address.town || "Unknown";
    return `${locality}`;

  } catch {
    return "Location not found";
  }
}

async function init() 
{
  try {

    const loc = await getCurrentLocation();
    map.setView([loc.lat, loc.lng], 16);
    marker.setLatLng([loc.lat, loc.lng]);

  } catch (err) {
    console.log("Init Error:", err);
  }
}


init();

navigator.geolocation.watchPosition(async function(position) 
{

    let lat = position.coords.latitude;
    let lng = position.coords.longitude;

    if (latlngs.length > 0) 
    {
      let last = latlngs[latlngs.length - 1];
      let distance = map.distance(last, [lat, lng]);

      if (distance > 50000) {
        latlngs = [];
        localStorage.removeItem("path");
        polyline.setLatLngs([]);
        return;
      }

      if (distance > 10000) 
      return;

      if (distance < 5) 
      return;
    }

    marker.setLatLng([lat, lng]);

    map.panTo([lat, lng], {
      animate: true,
      duration: 1
    });

    latlngs.push([lat, lng]);
    localStorage.setItem("path", JSON.stringify(latlngs));
    polyline.setLatLngs(latlngs);

    L.circleMarker([lat, lng], {
      radius: 4,
      color: "red"
    }).addTo(map);

    const locationName = await getLocationName(lat, lng);
    marker.bindPopup(locationName).openPopup();

}, 
function(error) 
{
    console.log("Error:", error.message);
}, 
{
    enableHighAccuracy: true,
    maximumAge: 0,
    timeout: 5000
});

document.getElementById("clearBtn").onclick = function() 
{
  localStorage.removeItem("path");
  location.reload();
};

</script>

</body>
</html>
