<!DOCTYPE html>
<html>
<head>
<title>Add and Sub</title>
</head>
<body>

<input type="number" id="t" placeholder="Enter the value.."><br>
<input type="number" id="t1" placeholder="Enter the value.."><br>
<input type="text" id="result" placeholder="Result"><br>

<input type="radio" name="ab" id="add">Add
<input type="radio" name="ab" id="sub">Sub<br>

<button onclick="Calculate()">Click</button>

<script>

function Calculate()
{
    let a = Number(document.getElementById("t").value);
    let b = Number(document.getElementById("t1").value);

    let x=(document.getElementById("add").checked);
    let y=(document.getElementById("sub").checked);

    if(x)
    {
        document.getElementById("result").value = a + b;
    }
    else if(y)
    {
        document.getElementById("result").value = a - b;
    }
    else
    {
        alert("Please select Add or Sub");
    }
}

</script>

</body>
</html>
