<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Even and Odd</title>
</head>
<body>
    
   <label>Value :<input type="number" id="num1"></label><br><br>
   <label>Result :<input type="text" id="result"></label><br><br>

   <button onclick="t()">Submit</button>

   <script>
     function t() 
     {
        let a = Number(document.getElementById("num1").value);

        if (a%2===0) 
        {
            document.getElementById("result").value="Even Number !";
        } 
        else 
        {
            document.getElementById("result").value="Odd Number !";
        }
     }
   </script>
   
</body>
</html>
