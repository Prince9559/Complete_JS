<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Condition Method</title>
</head>
<body>

    <script>

        function singleDigit(n)
        {
                result=((n>=0) && (n<=9));
                return result;

        }

        console.assert(singleDigit(5),"SingleDigit(5) Passed");
        console.assert(singleDigit(-2),"SingleDigit(-2) Failed");
        console.assert(singleDigit(99),"SingleDigit(99)Failed");

    </script>
    
</body>
</html>
