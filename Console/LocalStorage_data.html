 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalStorage</title>
</head>
<body>

<script>
     
    localStorage.setItem("pp_debug", JSON.stringify({
        time: new Date().toISOString(),
        note: "Hello from Console!"
    }));

    const data = JSON.parse(localStorage.getItem("pp_debug"));
    console.log(data);

</script>

</body>
</html>
