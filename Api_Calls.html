<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Api Calls</title>
</head>
<body>

    <script>

        fetch("https://prince9559.github.io/jsonproject/computer.json")
        .then(response =>response.json())
        .then(data =>{
            console.log(data);
            
            data.forEach(element => {

                document.write("<h3>"+element.question+"</h3>");
                document.write(element.a+"<br>");
                document.write(element.b+"<br>");
                document.write(element.c+"<br>");
                document.write(element.d+"<br>");
                
            });
        })

    </script>
    
</body>
</html>
