<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add and Sub</title>
</head>
<body>

    <label>Value I :  <input type="number" id="num1"></input></label><br>
    <label>Value II : <input type="number" id="num2"></input></label><br>
    <label>Result : <input type="text" id="result"></input></label><br><br>
    

    <button onclick="add()">Add</button>
    <button onclick="sub()">Sub</button>
    <button onclick="multi()">Multi</button>
    <button onclick="divi()">Divi</button>

    <script>

        function add()
        {
            let a=Number(document.getElementById("num1").value);
            let b=Number(document.getElementById("num2").value);
            document.getElementById("result").value=a+b;   
        }

        function sub()
        {
            let a=Number(document.getElementById("num1").value);
            let b=Number(document.getElementById("num2").value);
            document.getElementById("result").value=a-b;
        }
        
        function multi()
        {
            let a=Number(document.getElementById("num1").value);
            let b=Number(document.getElementById("num2").value);
            document.getElementById("result").value=a*b;
        }
        
        function divi()
        {
            let a=Number(document.getElementById("num1").value);
            let b=Number(document.getElementById("num2").value);
            document.getElementById("result").value=a/b;
        }

    </script>
    
</body>
</html>
