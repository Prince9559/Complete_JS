<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Canvas Scrolling Background</title>
</head>

<body>

<canvas id="canvas" width="800" height="200" style="border:1px solid black;"></canvas>

<script>
// Image load
const img = new Image();
img.src = "1.jpg"; // ⚠️ apni image ka naam yahan do

// Canvas setup
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// Variables
let x = 0;
const speed = 1; // speed badhani ho toh value increase karo

// Start animation after image load
img.onload = () => {
  requestAnimationFrame(draw);
};

// Draw function
function draw() {
  // Clear canvas
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // First image
  ctx.drawImage(img, x, 0, canvas.width, canvas.height);

  // Second image (loop banane ke liye)
  ctx.drawImage(img, x - canvas.width, 0, canvas.width, canvas.height);

  // Move image
  x += speed;

  // Reset position for infinite scroll
  if (x >= canvas.width) {
    x = 0;
  }

  // Loop animation
  requestAnimationFrame(draw);
}
</script>

</body>
</html>
