<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Navbar</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

#bgCanvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

#clockCanvas {
    position: fixed;
    top: 80px;   
    right: 20px;
    width: 120px;
    height: 120px;
    z-index: 10;
}

#ballCanvas {
    position: fixed;
    bottom: 20px;
    left: 10px;
    width: 300px;
    height: 200px;
    background: transparent;
    z-index: 5;
}

.navbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background-color: #6266e5;
    padding: 15px 30px;
    margin: 10px;
    border-radius: 10px 0px 10px 0px;
}

.logo img {
    height: 40px;
    border-radius: 10px 0px 10px 0px;
}

.menu {
    display: flex;
    gap: 30px;
}

.menu a {
    color: white;
    text-decoration: none;
    font-size: 18px;
    transition: 0.3s;
}

.menu a:hover {
    color: #00ffcc;
}
</style>

</head>
<body>

 
<canvas id="bgCanvas"></canvas>

 
<canvas id="clockCanvas"></canvas>

 
<canvas id="ballCanvas"></canvas>

 
<div class="navbar">
    <div class="logo">
        <img src="../pic/canvas.jpg" alt="logo">
    </div>

    <div class="menu">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </div>
</div>

<script>
 
const bgCanvas = document.getElementById("bgCanvas");
const context = bgCanvas.getContext("2d");
context.globalAlpha = 0.5;

const cursor = { x: innerWidth / 2, y: innerHeight / 2 };
let particlesArray = [];

function setSize() {
  bgCanvas.height = innerHeight;
  bgCanvas.width = innerWidth;
}

setSize();

function generateParticles(amount) {
  for (let i = 0; i < amount; i++) {
    particlesArray[i] = new Particle(
      innerWidth / 2,
      innerHeight / 2,
      4,
      generateColor(),
      0.02
    );
  }
}

generateParticles(100);

addEventListener("mousemove", e => { cursor.x = e.clientX; cursor.y = e.clientY; });
addEventListener("resize", setSize);

function generateColor() {
  let hexSet = "0123456789ABCDEF";
  let color = "#";
  for (let i = 0; i < 6; i++) {
    color += hexSet[Math.floor(Math.random() * 16)];
  }
  return color;
}

function Particle(x, y, size, color, speed) {
  this.x = x;
  this.y = y;
  this.size = size;
  this.color = color;
  this.theta = Math.random() * Math.PI * 2;
  this.speed = speed;
  this.radius = Math.random() * 150;

  this.update = () => {
    const last = { x: this.x, y: this.y };
    this.theta += this.speed;
    this.x = cursor.x + Math.cos(this.theta) * this.radius;
    this.y = cursor.y + Math.sin(this.theta) * this.radius;

    context.beginPath();
    context.lineWidth = this.size;
    context.strokeStyle = this.color;
    context.moveTo(last.x, last.y);
    context.lineTo(this.x, this.y);
    context.stroke();
  };
}

function animate() {
  requestAnimationFrame(animate);
  context.fillStyle = "rgba(0,0,0,0.05)";
  context.fillRect(0, 0, bgCanvas.width, bgCanvas.height);
  particlesArray.forEach(p => p.update());
}
animate();

 
const clockCanvas = document.getElementById("clockCanvas");
const ctx = clockCanvas.getContext("2d");
clockCanvas.width = 150;
clockCanvas.height = 150;

function drawClock() {
  const now = new Date();
  ctx.clearRect(0, 0, 150, 150);
  ctx.save();
  ctx.translate(75, 75);
  ctx.rotate(-Math.PI / 2);
  ctx.strokeStyle = "white";
  ctx.fillStyle = "white";
  ctx.lineWidth = 6;
  ctx.lineCap = "round";

   
  for (let i = 0; i < 12; i++) {
    ctx.beginPath();
    ctx.rotate(Math.PI / 6);
    ctx.moveTo(50, 0);
    ctx.lineTo(60, 0);
    ctx.stroke();
  }

  const sec = now.getSeconds();
  const min = now.getMinutes();
  const hr = now.getHours() % 12;

   
  ctx.save();
  ctx.rotate((Math.PI / 6) * hr + (Math.PI / 360) * min);
  ctx.lineWidth = 6;
  ctx.beginPath();
  ctx.moveTo(-10, 0);
  ctx.lineTo(40, 0);
  ctx.stroke();
  ctx.restore();

   
  ctx.save();
  ctx.rotate((Math.PI / 30) * min);
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(-15, 0);
  ctx.lineTo(60, 0);
  ctx.stroke();
  ctx.restore();

   
  ctx.save();
  ctx.rotate(sec * Math.PI / 30);
  ctx.strokeStyle = "red";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-20, 0);
  ctx.lineTo(70, 0);
  ctx.stroke();
  ctx.restore();

  ctx.restore();
  requestAnimationFrame(drawClock);
}
drawClock();

 
const ballCanvas = document.getElementById("ballCanvas");
const ballCtx = ballCanvas.getContext("2d");

ballCanvas.width = 300;
ballCanvas.height = 200;

const img = new Image();
img.src = "../pic/0.jpg"; 

const ball = {
  x: 100,
  y: 100,
  vx: 3,
  vy: 2,
  radius: 40,
  draw() {
    ballCtx.save();
    ballCtx.beginPath();
    ballCtx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ballCtx.closePath();
    ballCtx.clip();

    ballCtx.drawImage(
      img,
      this.x - this.radius,
      this.y - this.radius,
      this.radius * 2,
      this.radius * 2
    );
    ballCtx.restore();
  },
};

function animateBall() {
  ballCtx.clearRect(0, 0, ballCanvas.width, ballCanvas.height);
  ball.draw();
  ball.x += ball.vx;
  ball.y += ball.vy;

   
  if (ball.y + ball.radius > ballCanvas.height || ball.y - ball.radius < 0) ball.vy *= -1;
  if (ball.x + ball.radius > ballCanvas.width || ball.x - ball.radius < 0) ball.vx *= -1;

  requestAnimationFrame(animateBall);
}

img.onload = () => { animateBall(); };

</script>

</body>
</html>
