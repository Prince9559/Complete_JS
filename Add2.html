<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add and Sub</title>
</head>
<body>

<input type="number" id="t" placeholder="Enter the value I"><br>
<input type="number" id="t1" placeholder="Enter the value II"><br>
<input type="text" id="result" placeholder="Result"><br>

<select id="op">
    <option value="">Select option</option>
    <option value="add">Add</option>
    <option value="sub">Sub</option>
</select><br>

<button onclick="Calculate()">Calculate</button>

<script>
function Calculate()
{
    let a = Number(document.getElementById("t").value);
    let b = Number(document.getElementById("t1").value);
    let op = document.getElementById("op").value;

    if(op=="add")
    {
        document.getElementById("result").value=a+b;
    }
    else if(op=="sub")
    {
        document.getElementById("result").value=a-b;
    }
    else
    {
        alert("Please Select Option..");
    }
}
</script>

</body>
</html>
