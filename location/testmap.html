<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live Map Update</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body {margin: 0;font-family: Arial;}
    #map {height: 100vh;width: 100%;}
  </style>
</head>
<body>

<input type="number" id="lat" placeholder="Enter latitude.." step="any"/><br>
<input type="number" id="lon" placeholder="Enter longitude.." step="any"/><br>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

function setOnMap(latt,longt,zoomfactor)
{

let map = L.map("map").setView([latt, longt], zoomfactor);
let marker = L.marker([latt, longt]).addTo(map);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 19,
  attribution: "&copy; OpenStreetMap contributors",
}).addTo(map);
}


function updateMap() 
{
  let lat = parseFloat(document.getElementById("lat").value);
  let lon = parseFloat(document.getElementById("lon").value);

  if (!isNaN(lat) && !isNaN(lon)) 
  {
    map.setView([lat, lon], 13);
    marker.setLatLng([lat, lon]); 
  }
}

document.getElementById("lat").addEventListener("input", updateMap);
document.getElementById("lon").addEventListener("input", updateMap);

setOnMap(25.0,82.0,1);

</script>

</body>
</html>
