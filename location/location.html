<!DOCTYPE html>
<html>
<head>
    <title>Route to Bhadohi</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        #map { height: 100vh; }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([25.3949, 82.5680], 13);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

var destination = [25.3949, 82.5680];

var arrowIcon = L.icon({
    iconUrl: 'https://cdn-icons-png.flaticon.com/512/684/684908.png',
    iconSize: [35, 35],
    iconAnchor: [17, 35]
});

let userMarker;
let routeLine;

navigator.geolocation.watchPosition(async function(position) {

    let lat = position.coords.latitude;
    let lon = position.coords.longitude;

    let userLatLng = [lat, lon];

    if (!userMarker) {
        userMarker = L.marker(userLatLng, { icon: arrowIcon }).addTo(map);
    } else {
        userMarker.setLatLng(userLatLng);
    }

    map.setView(userLatLng, 14);

    let url = `https://router.project-osrm.org/route/v1/driving/${lon},${lat};${destination[1]},${destination[0]}?overview=full&geometries=geojson`;

    let res = await fetch(url);
    let data = await res.json();

    let route = data.routes[0];

    if (routeLine) {
        map.removeLayer(routeLine);
    }

    routeLine = L.geoJSON(route.geometry, {
        style: { color: 'blue', weight: 5 }
    }).addTo(map);

    let distance = (route.distance / 1000).toFixed(2);

    userMarker.bindPopup("📍 Distance to Bhadohi: " + distance + " km").openPopup();

}, function() {
    alert("Location allow karo ❗");
}, {
    enableHighAccuracy: true
});


function success(position) {
  doSomething(position.coords.latitude, position.coords.longitude);
}

function error() {
  alert("Sorry, no position available.");
}

const options = {
  enableHighAccuracy: true,
  maximumAge: 30000,
  timeout: 27000,
};

const watchID = navigator.geolocation.watchPosition(success, error, options);

</script>

</body>
</html>
