<!DOCTYPE html>
<html>
<head>
    <title>Live Tracking Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        #map { height: 100vh; }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([25.3949, 82.5680], 15);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
}).addTo(map);

var arrowIcon = L.icon({
    iconUrl: 'https://cdn-icons-png.flaticon.com/512/684/684908.png',
    iconSize: [35, 35],
    iconAnchor: [17, 35]
});

let marker;
let path = [];
let polyline = L.polyline([], { color: 'blue' }).addTo(map);
let totalDistance = 0;

function getDistance(lat1, lon1, lat2, lon2) {
    var R = 6371; 
    var dLat = (lat2 - lat1) * Math.PI / 180;
    var dLon = (lon2 - lon1) * Math.PI / 180;

    var a =
        Math.sin(dLat/2) * Math.sin(dLat/2) +
        Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
        Math.sin(dLon/2) * Math.sin(dLon/2);

    var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R * c; 
}

navigator.geolocation.watchPosition(function(position) {

    var lat = position.coords.latitude;
    var lon = position.coords.longitude;
    var latlng = [lat, lon];

    map.setView(latlng);

    if (!marker) {
        marker = L.marker(latlng, { icon: arrowIcon }).addTo(map);
    } else {
        marker.setLatLng(latlng);
    }

    path.push(latlng);
    polyline.setLatLngs(path);

    if (path.length > 1) {
        let prev = path[path.length - 2];
        let dist = getDistance(prev[0], prev[1], lat, lon);
        totalDistance += dist;
    }

    marker.bindPopup("📍 Distance: " + totalDistance.toFixed(3) + " km").openPopup();

}, function(error) {
    alert("Location allow karo ❗");
}, {
    enableHighAccuracy: true
});

</script>

</body>
</html>
