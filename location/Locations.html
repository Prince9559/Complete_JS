<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Distance</title>
</head>
<body>

<button onclick="Location()">Show Distance</button>
<div id="output"></div>

<script>
  function getDistance(lat1, lon1, lat2, lon2) 
  {
    const R = 6371; 

    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;

    const a =
      Math.sin(dLat / 2) * Math.sin(dLat / 2) +
      Math.cos(lat1 * Math.PI / 180) *
      Math.cos(lat2 * Math.PI / 180) *
      Math.sin(dLon / 2) * Math.sin(dLon / 2);

    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

    return R * c; 
  }

  function Location() {

    const targetLat = 25.2830;
    const targetLon = 82.8880;

    navigator.geolocation.getCurrentPosition(
      function (position) {

        const lat = position.coords.latitude;
        const lon = position.coords.longitude;

        const distance = getDistance(lat, lon, targetLat, targetLon);

        document.getElementById("output").innerHTML = "Your Location: " + lat + ", " + lon + "<br>" +  "Distance: " + distance.toFixed(2) + " KM";
      },
      function (error) {
        console.log(error.message);
      }
    );
  }
</script>

</body>
</html>
