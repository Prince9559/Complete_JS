<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Location</title>
</head>
<body>

    <button onclick="Location()">Show Location</button>
    <div id="output"></div>

    <script>
    function Location() 
    {
        navigator.geolocation.getCurrentPosition(
            function(position) 
            {
                document.getElementById("output").innerHTML ="Latitude: "+position.coords.latitude+"<br>" +"Longitude: " + position.coords.longitude;
            },
            function(error) 
            {
                document.getElementById("output").innerHTML ="Error: " +error.message;
            }
        );
    }
    
    </script>
    
</body>
</html>
