<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Location</title>
</head>
<body>

<button onclick="Location()">Show Location</button>
<button onclick="showData()">Show</button>
<div id="output"></div>


<script>

let locationArray = JSON.parse(localStorage.getItem("locations"))||[];

class LocationData 
{
  constructor(lat, lon, distance) 
  {
    this.latitude = lat;
    this.longitude = lon;
    this.distance = distance;
  }
}

function saveToLocalStorage() 
{
  localStorage.setItem("locations", JSON.stringify(locationArray));
}

function showData() 
{

  let output = document.getElementById("output");
  output.innerHTML = ""; 

  locationArray.forEach((item, index) => 
  {
    let div = document.createElement("div");

    div.innerHTML = `
      <b>Record ${index + 1}</b><br>
      Latitude: ${item.latitude} <br>
      Longitude: ${item.longitude} <br>
      Distance: ${item.distance} <br><br>
    `;

    output.appendChild(div);
  });
}

function Location() 
{
  navigator.geolocation.getCurrentPosition(
    function(position) 
    {
      let x1 = position.coords.latitude;
      let y1 = position.coords.longitude;

      let x2 = 25.3176;
      let y2 = 82.9739;

      let d = Math.sqrt(Math.pow((x2 - x1), 2) + Math.pow((y2 - y1), 2));

      let loc = new LocationData(x1, y1, d);
      locationArray.push(loc);

      saveToLocalStorage();

      document.getElementById("output").innerHTML = "Latitude: " + x1 + "<br>" +  "Longitude: " + y1 + "<br>" +  "Distance: " + d;

    },
    function(error) {
      console.log("Error:", error.message);
    }
  );
}

</script>

</body>
</html>
