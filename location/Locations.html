<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Location</title>
  </head>
  <body>
    <button onclick="Location()">Show Location</button>
    <div id="output"></div>

    <script>
      
      function Location() 
      {
        const watchId = navigator.geolocation.watchPosition(
          function (position) 
          {
            document.getElementById("output").innerHTML = "Updated Latitude: " + position.coords.latitude + "<br>" +"Updated Longitude: " + position.coords.longitude;
          },
          function (error) 
          {
            console.log("Watch error:", error.message);
          }
        );
      }
      
    </script>
  </body>
</html>
